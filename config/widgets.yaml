---
- resources:
    cpu: true
    memory: true
    cputemp: true
    tempmin: 0
    tempmax: 100
    uptime: true
    units: metric
    refresh: 3000
    network: true

- resources:
    disk: /host
    diskUnits: bytes
    refresh: 3000

- resources:
    disk: /mnt/storage
    diskUnits: bytes
    refresh: 3000

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
